<!DOCTYPE html>
<html lang="uk">
<head>
	<meta charset="UTF-8">
	<title>Форма</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>

<form>
	<label>E-mail:</label>
	<input type="email" placeholder="Your E-mail">

	<label>Пароль:</label>
	<input type="password" placeholder="Password">

	<label>Повторіть пароль:</label>
	<input type="password" placeholder="Repeat password">

	<label>Ім'я:</label>
	<input type="text" placeholder="Name">

	<label>Прізвище:</label>
	<input type="text" placeholder="Surname">

	<label>Стать:</label>
	<div>
		<input type="radio" name="gender"> чоловіча
		<input type="radio" name="gender"> жіноча
	</div>

	<label>Місто:</label>
	<select>
		<option>Житомир</option>
		<option>Київ</option>
		<option>Львів</option>
	</select>

	<label>Про себе:</label>
	<textarea></textarea>

	<div>
		<input type="checkbox"> Отримувати розсилку з сайту
	</div>
	<div>
		<input type="checkbox"> Погоджуюсь з правилами сайту
	</div>
	<div>
		<input type="checkbox"> Прийняти профіль на сайті
	</div>

	<div>
		<input type="submit" value="Зареєструватись">
		<input type="reset" value="Reset">
	</div>
</form>

</body>
</html>
