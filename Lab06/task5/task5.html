<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="form-box">
            <h2>Sign Up Today</h2>
            <p class="subtitle">The first 10 days are absolutely FREE!</p>
            
            <form>
                <div class="input-group">
                    <label>What's your name?*</label>
                    <input type="text" placeholder="Olivia Bennett">
                </div>
                
                <div class="input-group">
                    <label>Where can we email you?*</label>
                    <input type="email" placeholder="hello@yourock.com">
                </div>
                
                <div class="input-group">
                    <label>Pick a password:*</label>
                    <input type="password" placeholder="Make it a good one!">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="show-pass">
                    <label for="show-pass">Show password</label>
                </div>

                <div class="form-footer">
                    <button type="submit" class="btn-signup">Sign Up</button>
                    <span class="login-link">Have an account? <a href="#">Log in here!</a></span>
                </div>
            </form>
        </div>
        
        <div style="clear: both;"></div>
    </div>

</body>
</html>
